name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # 🔑 密钥配置：
          # 请确保你在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中
          # 添加了名为 AZURE_STATIC_WEB_APPS_API_TOKEN 的密钥
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          
          repo_token: ${{ secrets.GITHUB_TOKEN }} 
          action: "upload"
          
          ###### 仓库/构建配置 ######
          # 📂 应用位置：
          # 如果你的前端代码（package.json, vite.config.ts）在根目录，这里填 "/"
          # 如果在一个名为 'frontend' 的文件夹里，请改为 "/frontend"
          app_location: "/"             
          
          # ⚡ API 位置：
          # 重要：因为你的后端在 Cloudflare Workers，这里必须留空！
          # 如果填了 api_location，Azure 会尝试构建 Node.js 函数，这会导致错误。
          api_location: ""             
          
          # 📦 输出位置：
          # CloudPaste 使用 Vite 构建，默认输出目录通常是 "dist"。
          # 如果你的项目配置了输出到 "build" 或其他目录，请在此修改。
          output_location: "dist"      
          ###### 结束配置 ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
